    </filter>
  </defs>
  <rect width='1600' height='1000' fill='url(#g1)'/>
  <ellipse cx='360' cy='180' rx='340' ry='230' fill='#c78b56' opacity='0.24'/>
  <ellipse cx='1320' cy='320' rx='420' ry='290' fill='#305461' opacity='0.2'/>
  <ellipse cx='860' cy='880' rx='600' ry='260' fill='#1b1612' opacity='0.4'/>
  <rect width='1600' height='1000' filter='url(#grain)'/>
</svg>
